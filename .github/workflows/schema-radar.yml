name: Schema Radar

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */8 * * *'

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run schema radar
        run: |
          python run.py --sources sources.yaml --keywords keywords.yaml --offers offers.yaml --out-dir data --docs-dir docs

      - name: Commit dashboard + data updates
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data docs
            git commit -m "Update Schema Radar outputs"
            git push
          else
            echo "No changes to commit"
          fi
